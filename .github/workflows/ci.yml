name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Lint and Vet
        run: |
            nix develop --comand bash -c "
              cd backend
              go vet ./...
            "

      - name: Build
        run: |
            nix develop --command bash -c "
              cd backend/
              go build -v ./cmd/api
            "

      - name: Run tests
        run: |
            nix develop --command bash -c "
              cd backend/
              go test -v -count=1 ./...
            "
